<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volleyball Session Tracker</title>
  <link rel="stylesheet" href="volley.css?v=5" />
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <h1>Session Tracker</h1>
      <p class="app-subtitle">Train daily. Track smarter.</p>
      <div class="volley-badges" aria-hidden="true">
        <span>Beach Volleyball</span>
        <span>Sand Court</span>
        <span>Serve + Spike</span>
      </div>
      <div class="hero-strip" aria-hidden="true">
        <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Rio_2016_-_Beach_Volleyball_6_August_(BV002)_(29302885046).jpg" alt="Beach volleyball match" loading="lazy" />
        <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Women%27s_volleyball_final_1964_Olympics.jpg" alt="Volleyball net action" loading="lazy" />
        <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Volleyball_kill_shot_two_blockers.jpg" alt="Volleyball spike action" loading="lazy" />
      </div>
    </header>

    <section id="gallery-section" aria-label="Volleyball inspiration">
      <h2>Volleyball Inspiration</h2>
      <div class="gallery-grid" aria-hidden="true">
        <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Volley_smash.jpg" alt="Volleyball smash" loading="lazy" />
        <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Tip-Volleyball.jpg" alt="Volleyball tip" loading="lazy" />
        <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Volleyball_kill_shot_two_blockers.jpg" alt="Volleyball blockers and spike" loading="lazy" />
        <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Rio_2016_-_Beach_Volleyball_6_August_(BV002)_(29302885046).jpg" alt="Beach volleyball players" loading="lazy" />
      </div>
    </section>

    <section id="session-form-section" aria-labelledby="session-form-title">
      <h2 id="session-form-title">Session Form</h2>
      <p id="form-status-message" role="status" aria-live="polite" class="form-status-message">Ready. Add your first session.</p>
      <form id="session-form">
        <div class="field-row">
          <label for="session-date">Date</label>
          <input type="date" id="session-date" name="date" required />
        </div>

        <div class="field-row">
          <label for="serve-attempts" class="label-with-image"><img src="https://commons.wikimedia.org/wiki/Special:FilePath/Women%27s_volleyball_final_1964_Olympics.jpg" alt="" loading="lazy" />Serve Attempts</label>
          <input type="number" id="serve-attempts" name="serveAttempts" min="0" step="1" required />
        </div>

        <div class="field-row">
          <label for="serve-type">Serve Type</label>
          <select id="serve-type" name="serveType" required>
            <option value="">Select serve type</option>
            <option value="underhand">Underhand</option>
            <option value="overhand">Overhand</option>
            <option value="float">Float</option>
            <option value="jump-float">Jump Float</option>
            <option value="jump-topspin">Jump Topspin</option>
          </select>
        </div>

        <div class="field-row">
          <label for="aces">Aces</label>
          <input type="number" id="aces" name="aces" min="0" step="1" required />
        </div>

        <div class="field-row">
          <label for="serve-made" class="label-with-image"><img src="https://commons.wikimedia.org/wiki/Special:FilePath/Rio_2016_-_Beach_Volleyball_6_August_(BV002)_(29302885046).jpg" alt="" loading="lazy" />Serves Made</label>
          <input type="number" id="serve-made" name="serveMade" min="0" step="1" required />
        </div>

        <div class="field-row">
          <label for="spike-attempts" class="label-with-image"><img src="https://commons.wikimedia.org/wiki/Special:FilePath/Volleyball_kill_shot_two_blockers.jpg" alt="" loading="lazy" />Spike Attempts</label>
          <input type="number" id="spike-attempts" name="spikeAttempts" min="0" step="1" required />
        </div>

        <div class="field-row">
          <label for="spike-made" class="label-with-image"><img src="https://commons.wikimedia.org/wiki/Special:FilePath/Volley_smash.jpg" alt="" loading="lazy" />Spikes Made</label>
          <input type="number" id="spike-made" name="spikeMade" min="0" step="1" required />
        </div>

        <div class="field-row">
          <label for="sets-given">Sets Given</label>
          <input type="number" id="sets-given" name="setsGiven" min="0" step="1" required />
        </div>

        <div class="field-row">
          <label for="sets-tipped">Sets Tipped</label>
          <input type="number" id="sets-tipped" name="setsTipped" min="0" step="1" required />
        </div>

        <div class="field-row">
          <label for="sets-hit">Sets Hit</label>
          <input type="number" id="sets-hit" name="setsHit" min="0" step="1" required />
        </div>

        <div class="field-row">
          <label for="points-won">Points Won</label>
          <input type="number" id="points-won" name="pointsWon" min="0" step="1" required />
        </div>

        <div class="field-row">
          <label for="serves-hit-me">Serves That Hit Me</label>
          <input type="number" id="serves-hit-me" name="servesHitMe" min="0" step="1" required />
        </div>

        <div class="field-row">
          <label for="serves-passed-well">Serves Passed Well</label>
          <input type="number" id="serves-passed-well" name="servesPassedWell" min="0" step="1" required />
        </div>

        <button type="submit">Save Session</button>
      </form>
    </section>

    <section id="summary-section" aria-labelledby="summary-title">
      <h2 id="summary-title">Summary</h2>
      <div class="summary-cards">
        <article class="summary-card">
          <h3>Serve %</h3>
          <p id="serve-percent-value">0%</p>
        </article>
        <article class="summary-card">
          <h3>Spike %</h3>
          <p id="spike-percent-value">0%</p>
        </article>
        <article class="summary-card">
          <h3>Totals</h3>
          <p id="totals-value">0 sessions</p>
        </article>
      </div>
    </section>

    <section id="session-history-section" aria-labelledby="session-history-title">
      <h2 id="session-history-title">Session History</h2>
      <div class="history-container">
        <ul id="session-history-list">
          <li class="history-empty">No sessions recorded yet.</li>
        </ul>
      </div>
    </section>

    <section id="chart-section" aria-labelledby="chart-title">
      <h2 id="chart-title">Performance Chart</h2>
      <div class="chart-container">
        <canvas id="performance-chart" aria-label="Serve and spike performance by session"></canvas>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
